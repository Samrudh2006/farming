version: "3.9"

services:
  # ─── PostgreSQL Database ──────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: isin-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: isin_user
      POSTGRES_PASSWORD: isin_password
      POSTGRES_DB: isin_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isin_user -d isin_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis (for caching & rate limiting) ──────────────
  redis:
    image: redis:7-alpine
    container_name: isin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── FastAPI Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: isin-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://isin_user:isin_password@db:5432/isin_db
      SECRET_KEY: dev-secret-key-change-in-production
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      OPENAI_MODEL: gpt-4o-mini
      JUDGE0_URL: http://judge0:2358
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      ENVIRONMENT: development
      DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # ─── Judge0 (Code Execution Sandbox) ──────────────────
  judge0:
    image: judge0/judge0-ce:1.13.1
    container_name: isin-judge0
    restart: unless-stopped
    ports:
      - "2358:2358"
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
