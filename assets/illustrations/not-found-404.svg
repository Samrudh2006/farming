<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="notFoundGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5" stop-opacity="0.06"/>
      <stop offset="100%" style="stop-color:#7C3AED" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <circle cx="200" cy="110" r="95" fill="url(#notFoundGrad)"/>

  <!-- 404 text large -->
  <text x="200" y="130" font-family="system-ui, sans-serif" font-size="72" font-weight="900" fill="#E0E7FF" text-anchor="middle" letter-spacing="-2">404</text>

  <!-- Magnifying glass over the 0 -->
  <circle cx="200" cy="100" r="35" fill="none" stroke="#C7D2FE" stroke-width="3"/>
  <line x1="225" y1="125" x2="250" y2="150" stroke="#C7D2FE" stroke-width="4" stroke-linecap="round"/>
  <!-- Confused face in magnifier -->
  <circle cx="188" cy="95" r="3" fill="#A5B4FC"/>
  <circle cx="212" cy="95" r="3" fill="#A5B4FC"/>
  <path d="M190 110 Q200 105 210 110" stroke="#A5B4FC" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Floating dots -->
  <circle cx="100" cy="80" r="4" fill="#C7D2FE" opacity="0.4"/>
  <circle cx="300" cy="70" r="3" fill="#DDD6FE" opacity="0.3"/>
  <circle cx="120" cy="160" r="2.5" fill="#E0E7FF" opacity="0.5"/>
  <circle cx="280" cy="155" r="3.5" fill="#FBCFE8" opacity="0.3"/>

  <!-- Text -->
  <text x="200" y="195" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#4F46E5" text-anchor="middle">Page Not Found</text>
  <text x="200" y="220" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">The page you're looking for doesn't exist</text>
  <text x="200" y="237" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">or has been moved to a new location.</text>

  <!-- Go Home button -->
  <rect x="145" y="255" width="110" height="28" rx="14" fill="#4F46E5" opacity="0.1" stroke="#4F46E5" stroke-width="1"/>
  <text x="200" y="273" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#4F46E5" text-anchor="middle">Go Home</text>
</svg>