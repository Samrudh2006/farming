<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="heroGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5" stop-opacity="0.15"/>
      <stop offset="100%" style="stop-color:#EC4899" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background shape -->
  <ellipse cx="300" cy="200" rx="250" ry="170" fill="url(#heroGradLight)"/>

  <!-- Central Passport card -->
  <g transform="translate(170, 100)">
    <rect width="260" height="180" rx="16" fill="white" stroke="#C7D2FE" stroke-width="2"/>
    <!-- Header gradient -->
    <rect width="260" height="50" rx="16" fill="url(#heroGrad)"/>
    <rect y="35" width="260" height="15" fill="url(#heroGrad)"/>
    <!-- Header text -->
    <text x="130" y="32" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">SKILL PASSPORT</text>
    <!-- Avatar -->
    <circle cx="130" cy="70" r="22" fill="url(#heroGrad)" opacity="0.15"/>
    <circle cx="130" cy="63" r="8" fill="url(#heroGrad)" opacity="0.3"/>
    <path d="M115 82 Q115 72 130 70 Q145 72 145 82" fill="url(#heroGrad)" opacity="0.2"/>
    <!-- Score bars -->
    <rect x="30" y="105" width="200" height="8" rx="4" fill="#F1F5F9"/>
    <rect x="30" y="105" width="170" height="8" rx="4" fill="url(#heroGrad)" opacity="0.7"/>
    <text x="207" y="113" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#4F46E5">85</text>

    <rect x="30" y="122" width="200" height="8" rx="4" fill="#F1F5F9"/>
    <rect x="30" y="122" width="150" height="8" rx="4" fill="url(#heroGrad)" opacity="0.5"/>
    <text x="187" y="130" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#7C3AED">75</text>

    <rect x="30" y="139" width="200" height="8" rx="4" fill="#F1F5F9"/>
    <rect x="30" y="139" width="180" height="8" rx="4" fill="url(#heroGrad)" opacity="0.6"/>
    <text x="217" y="147" font-family="system-ui, sans-serif" font-size="8" font-weight="700" fill="#EC4899">90</text>

    <!-- Verified badge -->
    <g transform="translate(90, 158)">
      <rect width="80" height="18" rx="9" fill="#ECFDF5" stroke="#10B981" stroke-width="1"/>
      <circle cx="14" cy="9" r="5" fill="#10B981"/>
      <path d="M11 9 L13 11 L18 7" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
      <text x="26" y="13" font-family="system-ui, sans-serif" font-size="8" font-weight="600" fill="#059669">Verified</text>
    </g>
  </g>

  <!-- Floating network nodes -->
  <g opacity="0.6">
    <!-- Left cluster -->
    <circle cx="80" cy="120" r="20" fill="#4F46E5" opacity="0.1"/>
    <circle cx="80" cy="120" r="6" fill="#4F46E5" opacity="0.4"/>
    <circle cx="40" cy="180" r="15" fill="#7C3AED" opacity="0.08"/>
    <circle cx="40" cy="180" r="4" fill="#7C3AED" opacity="0.4"/>
    <circle cx="100" cy="250" r="12" fill="#A78BFA" opacity="0.1"/>
    <circle cx="100" cy="250" r="4" fill="#A78BFA" opacity="0.4"/>
    <line x1="80" y1="120" x2="40" y2="180" stroke="#7C3AED" stroke-width="1" opacity="0.2"/>
    <line x1="40" y1="180" x2="100" y2="250" stroke="#A78BFA" stroke-width="1" opacity="0.2"/>
    <line x1="80" y1="120" x2="170" y2="150" stroke="#4F46E5" stroke-width="1" opacity="0.15"/>

    <!-- Right cluster -->
    <circle cx="520" cy="130" r="18" fill="#EC4899" opacity="0.1"/>
    <circle cx="520" cy="130" r="5" fill="#EC4899" opacity="0.4"/>
    <circle cx="560" cy="200" r="14" fill="#F472B6" opacity="0.08"/>
    <circle cx="560" cy="200" r="4" fill="#F472B6" opacity="0.4"/>
    <circle cx="500" cy="270" r="16" fill="#C084FC" opacity="0.1"/>
    <circle cx="500" cy="270" r="5" fill="#C084FC" opacity="0.4"/>
    <line x1="520" y1="130" x2="560" y2="200" stroke="#F472B6" stroke-width="1" opacity="0.2"/>
    <line x1="560" y1="200" x2="500" y2="270" stroke="#C084FC" stroke-width="1" opacity="0.2"/>
    <line x1="520" y1="130" x2="430" y2="150" stroke="#EC4899" stroke-width="1" opacity="0.15"/>
  </g>

  <!-- Labels -->
  <text x="80" y="330" font-family="system-ui, sans-serif" font-size="10" fill="#6366F1" text-anchor="middle" font-weight="500">Code Quality</text>
  <text x="300" y="330" font-family="system-ui, sans-serif" font-size="10" fill="#7C3AED" text-anchor="middle" font-weight="500">AI-Verified</text>
  <text x="520" y="330" font-family="system-ui, sans-serif" font-size="10" fill="#EC4899" text-anchor="middle" font-weight="500">Trust Score</text>

  <!-- Bottom tagline -->
  <text x="300" y="370" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1E1B4B" text-anchor="middle">Skills Speak Louder Than Resumes</text>
  <text x="300" y="390" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">AI-verified skill assessments for the next generation of hiring</text>
</svg>