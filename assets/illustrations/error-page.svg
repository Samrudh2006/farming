<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <defs>
    <linearGradient id="errGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444" stop-opacity="0.08"/>
      <stop offset="100%" style="stop-color:#F97316" stop-opacity="0.03"/>
    </linearGradient>
  </defs>

  <!-- Background shape -->
  <circle cx="200" cy="130" r="100" fill="url(#errGrad)"/>

  <!-- Broken connection illustration -->
  <!-- Left node -->
  <circle cx="130" cy="120" r="25" fill="white" stroke="#FCA5A5" stroke-width="2"/>
  <circle cx="130" cy="120" r="8" fill="#EF4444" opacity="0.2"/>
  <circle cx="130" cy="120" r="3" fill="#EF4444" opacity="0.5"/>

  <!-- Right node -->
  <circle cx="270" cy="120" r="25" fill="white" stroke="#FCA5A5" stroke-width="2"/>
  <circle cx="270" cy="120" r="8" fill="#EF4444" opacity="0.2"/>
  <circle cx="270" cy="120" r="3" fill="#EF4444" opacity="0.5"/>

  <!-- Broken line -->
  <line x1="155" y1="120" x2="185" y2="120" stroke="#FCA5A5" stroke-width="2" stroke-linecap="round"/>
  <line x1="215" y1="120" x2="245" y2="120" stroke="#FCA5A5" stroke-width="2" stroke-linecap="round"/>

  <!-- Lightning bolt (break) -->
  <path d="M192 108 L198 117 L193 117 L200 132 L194 120 L199 120 Z" fill="#EF4444" opacity="0.6"/>

  <!-- Warning triangle -->
  <g transform="translate(180, 70)">
    <polygon points="20,0 40,35 0,35" fill="#FEF2F2" stroke="#EF4444" stroke-width="1.5"/>
    <text x="20" y="28" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#EF4444" text-anchor="middle">!</text>
  </g>

  <!-- Floating particles -->
  <circle cx="170" cy="90" r="2" fill="#FCA5A5" opacity="0.4"/>
  <circle cx="230" cy="85" r="1.5" fill="#FCA5A5" opacity="0.3"/>
  <circle cx="160" cy="155" r="2.5" fill="#FECACA" opacity="0.4"/>
  <circle cx="240" cy="160" r="2" fill="#FECACA" opacity="0.3"/>

  <!-- Text -->
  <text x="200" y="210" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#DC2626" text-anchor="middle">Something went wrong</text>
  <text x="200" y="235" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">We couldn't connect to the server.</text>
  <text x="200" y="252" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Please try again in a moment.</text>

  <!-- Retry button -->
  <rect x="155" y="266" width="90" height="28" rx="14" fill="#EF4444" opacity="0.1" stroke="#EF4444" stroke-width="1"/>
  <text x="200" y="284" font-family="system-ui, sans-serif" font-size="11" font-weight="600" fill="#DC2626" text-anchor="middle">Retry</text>
</svg>