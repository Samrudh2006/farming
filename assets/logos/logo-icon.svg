  <!-- Network nodes -->
  <circle cx="40" cy="40" r="10" fill="white" opacity="0.95"/>
  <circle cx="18" cy="22" r="6" fill="white" opacity="0.7"/>
  <circle cx="62" cy="22" r="6" fill="white" opacity="0.7"/>
  <circle cx="18" cy="58" r="6" fill="white" opacity="0.7"/>
  <circle cx="62" cy="58" r="6" fill="white" opacity="0.7"/>
  <circle cx="40" cy="12" r="4" fill="white" opacity="0.5"/>
