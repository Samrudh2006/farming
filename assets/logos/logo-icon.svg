  <line x1="40" y1="40" x2="18" y2="22" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="40" y1="40" x2="62" y2="22" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="40" y1="40" x2="18" y2="58" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="40" y1="40" x2="62" y2="58" stroke="white" stroke-width="1.5" opacity="0.4"/>
  <line x1="40" y1="40" x2="40" y2="12" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <line x1="40" y1="40" x2="40" y2="68" stroke="white" stroke-width="1.2" opacity="0.3"/>
  <line x1="18" y1="22" x2="62" y2="22" stroke="white" stroke-width="1" opacity="0.25"/>
  <line x1="18" y1="58" x2="62" y2="58" stroke="white" stroke-width="1" opacity="0.25"/>
