<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" fill="none">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1"/>
      <stop offset="100%" style="stop-color:#A855F7"/>
    </linearGradient>
  </defs>
  <!-- Skill Graph Icon -->
  <g transform="translate(10, 10)">
    <!-- Hexagonal network nodes -->
    <circle cx="40" cy="40" r="12" fill="url(#logoGrad)" opacity="0.9"/>
    <circle cx="12" cy="20" r="7" fill="url(#nodeGrad)" opacity="0.8"/>
    <circle cx="68" cy="20" r="7" fill="url(#nodeGrad)" opacity="0.8"/>
    <circle cx="12" cy="60" r="7" fill="url(#nodeGrad)" opacity="0.8"/>
    <circle cx="68" cy="60" r="7" fill="url(#nodeGrad)" opacity="0.8"/>
    <circle cx="40" cy="8" r="5" fill="#EC4899" opacity="0.7"/>
    <circle cx="40" cy="72" r="5" fill="#EC4899" opacity="0.7"/>
    <!-- Connection lines -->
    <line x1="40" y1="40" x2="12" y2="20" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="40" x2="68" y2="20" stroke="#6366F1" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="40" x2="12" y2="60" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="40" x2="68" y2="60" stroke="#7C3AED" stroke-width="1.5" opacity="0.5"/>
    <line x1="40" y1="40" x2="40" y2="8" stroke="#A855F7" stroke-width="1.5" opacity="0.4"/>
    <line x1="40" y1="40" x2="40" y2="72" stroke="#A855F7" stroke-width="1.5" opacity="0.4"/>
    <line x1="12" y1="20" x2="68" y2="20" stroke="#6366F1" stroke-width="1" opacity="0.3"/>
    <line x1="12" y1="60" x2="68" y2="60" stroke="#7C3AED" stroke-width="1" opacity="0.3"/>
    <!-- Center pulse -->
    <circle cx="40" cy="40" r="5" fill="white"/>
    <circle cx="40" cy="40" r="3" fill="url(#logoGrad)"/>
  </g>
  <!-- ISIN Text -->
  <text x="100" y="45" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="800" fill="#1E1B4B" letter-spacing="-1">
    ISIN
  </text>
  <!-- Full Name -->
  <text x="100" y="70" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" font-weight="500" fill="#6366F1" letter-spacing="2.5" text-transform="uppercase">
    SKILL INTELLIGENCE NETWORK
  </text>
  <!-- Tagline -->
  <text x="100" y="88" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="10" font-weight="400" fill="#9CA3AF" letter-spacing="0.5">
    Verify Skills. Not Resumes.
  </text>
</svg>