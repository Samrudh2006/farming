  <!-- Bottom accent -->
  <rect x="80" y="430" width="120" height="4" rx="2" fill="url(#ogAccent)"/>
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="url(#ogAccent)" opacity="0.15"/>
  <text x="80" y="616" font-family="system-ui, sans-serif" font-size="16" fill="#818CF8" font-weight="500">isin.dev</text>
  <text x="1120" y="616" font-family="system-ui, sans-serif" font-size="14" fill="#64748B" text-anchor="end">Prove Skills. Get Hired.</text>
