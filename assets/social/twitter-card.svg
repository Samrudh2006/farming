    <line x1="480" y1="120" x2="530" y2="200" stroke="#818CF8" stroke-width="1"/><line x1="480" y1="120" x2="440" y2="220" stroke="#A78BFA" stroke-width="1"/><line x1="530" y1="200" x2="440" y2="220" stroke="#C084FC" stroke-width="1"/>
