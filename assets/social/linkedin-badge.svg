<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" fill="none">
  <defs>
    <linearGradient id="linkedinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  <!-- Card background -->
  <rect width="400" height="120" rx="12" fill="white"/>
  <rect width="400" height="120" rx="12" stroke="url(#linkedinGrad)" stroke-width="2" fill="none"/>
  <!-- Left gradient bar -->
  <rect x="0" y="0" width="6" height="120" rx="3" fill="url(#linkedinGrad)"/>
  <!-- Network icon -->
  <g transform="translate(24, 25)">
    <circle cx="35" cy="35" r="28" fill="url(#linkedinGrad)" opacity="0.08"/>
    <circle cx="35" cy="35" r="12" fill="url(#linkedinGrad)" opacity="0.2"/>
    <circle cx="35" cy="35" r="5" fill="url(#linkedinGrad)"/>
    <circle cx="18" cy="18" r="3.5" fill="#818CF8"/>
    <circle cx="52" cy="18" r="3.5" fill="#A78BFA"/>
    <circle cx="18" cy="52" r="3.5" fill="#C084FC"/>
    <circle cx="52" cy="52" r="3.5" fill="#EC4899"/>
    <line x1="35" y1="35" x2="18" y2="18" stroke="#818CF8" stroke-width="1" opacity="0.5"/>
    <line x1="35" y1="35" x2="52" y2="18" stroke="#A78BFA" stroke-width="1" opacity="0.5"/>
    <line x1="35" y1="35" x2="18" y2="52" stroke="#C084FC" stroke-width="1" opacity="0.5"/>
    <line x1="35" y1="35" x2="52" y2="52" stroke="#EC4899" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Score circle -->
  <circle cx="130" cy="60" r="30" fill="url(#linkedinGrad)" opacity="0.05"/>
  <circle cx="130" cy="60" r="26" fill="none" stroke="#E2E8F0" stroke-width="4"/>
  <circle cx="130" cy="60" r="26" fill="none" stroke="url(#linkedinGrad)" stroke-width="4" stroke-linecap="round"
    stroke-dasharray="130" stroke-dashoffset="23" transform="rotate(-90 130 60)"/>
  <text x="130" y="56" font-family="system-ui, sans-serif" font-size="18" font-weight="800" fill="#1E1B4B" text-anchor="middle">82</text>
  <text x="130" y="70" font-family="system-ui, sans-serif" font-size="7" font-weight="500" fill="#94A3B8" text-anchor="middle">SCORE</text>
  <!-- Text content -->
  <text x="175" y="35" font-family="system-ui, sans-serif" font-size="10" font-weight="600" fill="#7C3AED" letter-spacing="1">ISIN SKILL PASSPORT</text>
  <text x="175" y="58" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1E1B4B">Python Backend Developer</text>
  <text x="175" y="78" font-family="system-ui, sans-serif" font-size="11" fill="#64748B">4 tasks verified · Junior Level</text>
  <!-- Verified badge -->
  <g transform="translate(175, 86)">
    <rect width="80" height="22" rx="11" fill="#ECFDF5"/>
    <circle cx="14" cy="11" r="6" fill="#10B981"/>
    <path d="M11 11 L13 13 L18 8" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <text x="27" y="15" font-family="system-ui, sans-serif" font-size="9" font-weight="600" fill="#059669">Verified</text>
  </g>
</svg>