<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" fill="none">
  <defs>
    <linearGradient id="heroBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0A2A"/>
      <stop offset="30%" style="stop-color:#1E1B4B"/>
      <stop offset="60%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#170F3D"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#4F46E5;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <!-- Base gradient -->
  <rect width="1440" height="900" fill="url(#heroBg)"/>
  <!-- Glow spots -->
  <rect width="1440" height="900" fill="url(#glow1)"/>
  <rect width="1440" height="900" fill="url(#glow2)"/>
  <rect width="1440" height="900" fill="url(#glow3)"/>
  <!-- Grid pattern -->
  <g opacity="0.05" stroke="#818CF8" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="900"/><line x1="60" y1="0" x2="60" y2="900"/>
    <line x1="120" y1="0" x2="120" y2="900"/><line x1="180" y1="0" x2="180" y2="900"/>
    <line x1="240" y1="0" x2="240" y2="900"/><line x1="300" y1="0" x2="300" y2="900"/>
    <line x1="360" y1="0" x2="360" y2="900"/><line x1="420" y1="0" x2="420" y2="900"/>
    <line x1="480" y1="0" x2="480" y2="900"/><line x1="540" y1="0" x2="540" y2="900"/>
    <line x1="600" y1="0" x2="600" y2="900"/><line x1="660" y1="0" x2="660" y2="900"/>
    <line x1="720" y1="0" x2="720" y2="900"/><line x1="780" y1="0" x2="780" y2="900"/>
    <line x1="840" y1="0" x2="840" y2="900"/><line x1="900" y1="0" x2="900" y2="900"/>
    <line x1="960" y1="0" x2="960" y2="900"/><line x1="1020" y1="0" x2="1020" y2="900"/>
    <line x1="1080" y1="0" x2="1080" y2="900"/><line x1="1140" y1="0" x2="1140" y2="900"/>
    <line x1="1200" y1="0" x2="1200" y2="900"/><line x1="1260" y1="0" x2="1260" y2="900"/>
    <line x1="1320" y1="0" x2="1320" y2="900"/><line x1="1380" y1="0" x2="1380" y2="900"/>
    <line x1="1440" y1="0" x2="1440" y2="900"/>
    <line x1="0" y1="0" x2="1440" y2="0"/><line x1="0" y1="60" x2="1440" y2="60"/>
    <line x1="0" y1="120" x2="1440" y2="120"/><line x1="0" y1="180" x2="1440" y2="180"/>
    <line x1="0" y1="240" x2="1440" y2="240"/><line x1="0" y1="300" x2="1440" y2="300"/>
    <line x1="0" y1="360" x2="1440" y2="360"/><line x1="0" y1="420" x2="1440" y2="420"/>
    <line x1="0" y1="480" x2="1440" y2="480"/><line x1="0" y1="540" x2="1440" y2="540"/>
    <line x1="0" y1="600" x2="1440" y2="600"/><line x1="0" y1="660" x2="1440" y2="660"/>
    <line x1="0" y1="720" x2="1440" y2="720"/><line x1="0" y1="780" x2="1440" y2="780"/>
    <line x1="0" y1="840" x2="1440" y2="840"/><line x1="0" y1="900" x2="1440" y2="900"/>
  </g>
  <!-- Floating network nodes (decorative) -->
  <g opacity="0.12">
    <circle cx="200" cy="150" r="4" fill="#818CF8"/>
    <circle cx="350" cy="280" r="3" fill="#A78BFA"/>
    <circle cx="150" cy="400" r="5" fill="#6366F1"/>
    <circle cx="500" cy="200" r="3" fill="#C084FC"/>
    <circle cx="700" cy="120" r="4" fill="#818CF8"/>
    <circle cx="900" cy="300" r="5" fill="#A78BFA"/>
    <circle cx="1100" cy="180" r="3" fill="#F472B6"/>
    <circle cx="1250" cy="350" r="4" fill="#818CF8"/>
    <circle cx="400" cy="600" r="3" fill="#F472B6"/>
    <circle cx="600" cy="700" r="4" fill="#6366F1"/>
    <circle cx="850" cy="650" r="3" fill="#C084FC"/>
    <circle cx="1050" cy="550" r="5" fill="#818CF8"/>
    <circle cx="1300" cy="700" r="3" fill="#A78BFA"/>
    <circle cx="300" cy="800" r="4" fill="#F472B6"/>
    <circle cx="750" cy="500" r="3" fill="#6366F1"/>
    <!-- Connection lines between some nodes -->
    <line x1="200" y1="150" x2="350" y2="280" stroke="#818CF8" stroke-width="0.5" opacity="0.5"/>
    <line x1="350" y1="280" x2="500" y2="200" stroke="#A78BFA" stroke-width="0.5" opacity="0.4"/>
    <line x1="700" y1="120" x2="900" y2="300" stroke="#818CF8" stroke-width="0.5" opacity="0.5"/>
    <line x1="900" y1="300" x2="1100" y2="180" stroke="#C084FC" stroke-width="0.5" opacity="0.4"/>
    <line x1="1100" y1="180" x2="1250" y2="350" stroke="#F472B6" stroke-width="0.5" opacity="0.4"/>
    <line x1="600" y1="700" x2="850" y2="650" stroke="#6366F1" stroke-width="0.5" opacity="0.4"/>
    <line x1="850" y1="650" x2="1050" y2="550" stroke="#818CF8" stroke-width="0.5" opacity="0.5"/>
    <line x1="150" y1="400" x2="400" y2="600" stroke="#A78BFA" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Large subtle orbs -->
  <circle cx="250" cy="250" r="200" fill="#4F46E5" opacity="0.03"/>
  <circle cx="1100" cy="600" r="250" fill="#EC4899" opacity="0.025"/>
  <circle cx="720" cy="450" r="300" fill="#7C3AED" opacity="0.02"/>
