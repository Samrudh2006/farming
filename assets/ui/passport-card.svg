<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 60" fill="none">
  <defs>
    <linearGradient id="passportCardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  <!-- Card frame -->
  <rect x="1" y="1" width="298" height="58" rx="12" fill="white"/>
  <rect x="1" y="1" width="298" height="58" rx="12" stroke="url(#passportCardGrad)" stroke-width="2" fill="none"/>
  <!-- Left accent bar -->
  <rect x="1" y="1" width="8" height="58" rx="4" fill="url(#passportCardGrad)"/>
  <!-- Score circle -->
  <circle cx="40" cy="30" r="16" fill="url(#passportCardGrad)" opacity="0.1"/>
  <text x="40" y="35" font-family="system-ui, sans-serif" font-size="16" font-weight="800" fill="#4F46E5" text-anchor="middle">82</text>
  <!-- Name + skill -->
  <text x="66" y="22" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#1E1B4B">Python Backend</text>
  <text x="66" y="38" font-family="system-ui, sans-serif" font-size="9" fill="#64748B">Junior Developer · 4 tasks verified</text>
  <text x="66" y="52" font-family="system-ui, sans-serif" font-size="8" fill="#A78BFA" font-weight="500">ISIN-2024-0042</text>
  <!-- Right: verified badge -->
  <circle cx="262" cy="24" r="10" fill="#10B981" opacity="0.1"/>
  <circle cx="262" cy="24" r="10" stroke="#10B981" stroke-width="1.5" fill="none"/>
  <path d="M257 24 L260 27 L267 20" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <text x="262" y="44" font-family="system-ui, sans-serif" font-size="7" fill="#10B981" text-anchor="middle" font-weight="600">Verified</text>
</svg>