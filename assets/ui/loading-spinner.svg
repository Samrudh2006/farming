<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="spinGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#EC4899" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <circle cx="24" cy="24" r="18" fill="none" stroke="#EEF2FF" stroke-width="4"/>
  <circle cx="24" cy="24" r="18" fill="none" stroke="url(#spinGrad)" stroke-width="4" stroke-linecap="round"
    stroke-dasharray="85" stroke-dashoffset="20" transform="rotate(-90 24 24)">
    <animateTransform attributeName="transform" type="rotate" from="0 24 24" to="360 24 24" dur="1s" repeatCount="indefinite"/>
  </circle>
