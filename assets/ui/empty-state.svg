<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" fill="none">
  <defs>
    <linearGradient id="emptyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5" stop-opacity="0.1"/>
      <stop offset="100%" style="stop-color:#7C3AED" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
  <!-- Empty box illustration -->
  <rect x="75" y="20" width="150" height="110" rx="16" fill="url(#emptyGrad)" stroke="#C7D2FE" stroke-width="1.5" stroke-dasharray="6 3"/>
  <!-- Document lines -->
  <rect x="105" y="50" width="90" height="6" rx="3" fill="#C7D2FE"/>
  <rect x="105" y="64" width="70" height="6" rx="3" fill="#E0E7FF"/>
  <rect x="105" y="78" width="80" height="6" rx="3" fill="#E0E7FF"/>
  <rect x="105" y="92" width="50" height="6" rx="3" fill="#EEF2FF"/>
  <!-- Plus icon -->
  <circle cx="150" cy="72" r="20" fill="none" stroke="#A5B4FC" stroke-width="1.5" stroke-dasharray="4 2" opacity="0.5"/>
  <!-- Text -->
  <text x="150" y="155" font-family="system-ui, sans-serif" font-size="14" font-weight="600" fill="#6366F1" text-anchor="middle">No results yet</text>
  <text x="150" y="175" font-family="system-ui, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle">Complete a skill task to see your score</text>
</svg>