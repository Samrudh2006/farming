<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5" stop-opacity="0.3"/>
      <stop offset="100%" style="stop-color:#7C3AED" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="radarStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  <!-- Radar grid - 5 levels -->
  <polygon points="100,20 168,56 168,144 100,180 32,144 32,56" fill="none" stroke="#E2E8F0" stroke-width="0.8"/>
  <polygon points="100,36 152,64 152,136 100,164 48,136 48,64" fill="none" stroke="#E2E8F0" stroke-width="0.8"/>
  <polygon points="100,52 136,72 136,128 100,148 64,128 64,72" fill="none" stroke="#E2E8F0" stroke-width="0.8"/>
  <polygon points="100,68 120,80 120,120 100,132 80,120 80,80" fill="none" stroke="#E2E8F0" stroke-width="0.8"/>
  <polygon points="100,84 108,88 108,112 100,116 92,112 92,88" fill="none" stroke="#E2E8F0" stroke-width="0.8"/>
  <!-- Axis lines -->
  <line x1="100" y1="20" x2="100" y2="180" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="32" y1="56" x2="168" y2="144" stroke="#E2E8F0" stroke-width="0.5"/>
  <line x1="32" y1="144" x2="168" y2="56" stroke="#E2E8F0" stroke-width="0.5"/>
  <!-- Data polygon - sample high-performing candidate -->
  <polygon points="100,28 160,62 150,140 100,170 45,130 40,60" fill="url(#radarGrad)" stroke="url(#radarStroke)" stroke-width="2"/>
  <!-- Data points -->
  <circle cx="100" cy="28" r="4" fill="#4F46E5"/>
  <circle cx="160" cy="62" r="4" fill="#6366F1"/>
  <circle cx="150" cy="140" r="4" fill="#7C3AED"/>
  <circle cx="100" cy="170" r="4" fill="#A78BFA"/>
  <circle cx="45" cy="130" r="4" fill="#C084FC"/>
  <circle cx="40" cy="60" r="4" fill="#EC4899"/>
  <!-- Labels -->
  <text x="100" y="14" font-family="system-ui, sans-serif" font-size="9" fill="#4F46E5" text-anchor="middle" font-weight="600">Code Quality</text>
  <text x="176" y="56" font-family="system-ui, sans-serif" font-size="9" fill="#6366F1" font-weight="600">Correctness</text>
  <text x="176" y="148" font-family="system-ui, sans-serif" font-size="9" fill="#7C3AED" font-weight="600">Efficiency</text>
  <text x="100" y="194" font-family="system-ui, sans-serif" font-size="9" fill="#A78BFA" text-anchor="middle" font-weight="600">Error Handling</text>
  <text x="14" y="148" font-family="system-ui, sans-serif" font-size="9" fill="#C084FC" font-weight="600">Structure</text>
  <text x="20" y="56" font-family="system-ui, sans-serif" font-size="9" fill="#EC4899" font-weight="600">Readability</text>
</svg>