<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="circGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#EC4899"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#F1F5F9" stroke-width="10"/>
  <!-- Progress arc (82%) - using dasharray -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="url(#circGrad)" stroke-width="10" stroke-linecap="round"
    stroke-dasharray="268" stroke-dashoffset="48" transform="rotate(-90 60 60)"/>
  <!-- Score text -->
  <text x="60" y="55" font-family="system-ui, sans-serif" font-size="28" font-weight="800" fill="#1E1B4B" text-anchor="middle">82</text>
  <text x="60" y="72" font-family="system-ui, sans-serif" font-size="10" font-weight="500" fill="#64748B" text-anchor="middle">SKILL SCORE</text>
</svg>